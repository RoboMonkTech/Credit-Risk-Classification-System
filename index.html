<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Risk Classification System</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <div class="left-panel">

        <h1>Credit Risk Classification</h1>
        <p class="subtitle">Machine Learning Based Loan Risk Prediction</p>

        <div class="form-group">
            <label>Applicant Name</label>
            <input type="text" id="name" placeholder="Enter Applicant Name">
        </div>

        <div class="form-group">
            <label>Age</label>
            <input type="number" id="age">
        </div>

        <div class="form-group">
            <label>Gender</label>
            <select id="sex">
                <option>Male</option>
                <option>Female</option>
            </select>
        </div>

        <div class="form-group">
            <label>Job Level</label>
            <select id="job">
                <option>0</option>
                <option>1</option>
                <option>2</option>
                <option>3</option>
            </select>
        </div>

        <div class="form-group">
            <label>Housing</label>
            <select id="housing">
                <option>Own</option>
                <option>Rent</option>
                <option>Free</option>
            </select>
        </div>

        <div class="form-group">
            <label>Saving Account</label>
            <select id="saving">
                <option>Little</option>
                <option>Moderate</option>
                <option>Quite Rich</option>
                <option>Rich</option>
            </select>
        </div>

        <div class="form-group">
            <label>Checking Account</label>
            <select id="checking">
                <option>Little</option>
                <option>Moderate</option>
                <option>Rich</option>
            </select>
        </div>

        <div class="form-group">
            <label>Credit Amount</label>
            <input type="number" id="credit">
        </div>

        <div class="form-group">
            <label>Duration (Months)</label>
            <input type="number" id="duration">
        </div>

        <div class="form-group">
            <label>Purpose</label>
            <select id="purpose">
                <option>Car</option>
                <option>Education</option>
                <option>Furniture</option>
                <option>Business</option>
                <option>Radio/TV</option>
                <option>Repairs</option>
            </select>
        </div>

        <button onclick="predictRisk()">
            Predict Credit Risk
        </button>

    </div>

    <div class="right-panel">

        <h2>Prediction Result</h2>

        <div class="result-card">

            <div id="emoji" class="emoji">
                🏦
            </div>

            <h3 id="result">
                Waiting for Prediction...
            </h3>

            <p id="confidence">
                Confidence : --
            </p>

            <p id="recommendation">
                Enter customer information and click Predict.
            </p>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
